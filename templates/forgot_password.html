{% extends "auth_base.html" %}

{% block content %}
<h2>Reset access</h2>
<p>Prepare a password recovery flow for the demo account.</p>

<form class="auth-form" id="forgot-form" data-auth-form="forgot-password">
    <div class="field full">
        <label for="forgot-email">Staff email</label>
        <input id="forgot-email" type="email" required placeholder="doctor@hospital.org">
    </div>

    <div class="auth-empty">
        A mock reset link will be generated locally and the screen will move to the reset form.
    </div>

    <div class="auth-actions">
        <a class="btn" href="{{ url_for('login') }}">Back to sign in</a>
        <button class="btn primary" type="submit">Send reset link</button>
    </div>
</form>
{% endblock %}
