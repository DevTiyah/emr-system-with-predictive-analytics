{% extends "auth_base.html" %}

{% block content %}
<h2>Set new password</h2>
<p>Use the token below to complete the mock password reset.</p>

<form class="auth-form" id="reset-form" data-auth-form="reset-password">
    <div class="field full">
        <label for="reset-token">Reset token</label>
        <input id="reset-token" type="text" required value="{{ request.query_params.get('token', 'EMR-RESET-2026') }}">
    </div>
    <div class="field">
        <label for="reset-password-input">New password</label>
        <input id="reset-password-input" type="password" required minlength="6" placeholder="Create password">
    </div>
    <div class="field">
        <label for="reset-confirm">Confirm password</label>
        <input id="reset-confirm" type="password" required minlength="6" placeholder="Repeat password">
    </div>

    <div class="auth-actions">
        <a class="btn" href="{{ url_for('login') }}">Back to sign in</a>
        <button class="btn primary" type="submit">Update password</button>
    </div>

    <div class="auth-footer">
        <span>Mock reset completes locally and returns you to the login page.</span>
        <span>Session data remains unchanged until you sign in again.</span>
    </div>
</form>
{% endblock %}
