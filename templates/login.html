{% extends "auth_base.html" %}

{% block content %}
<h2>Sign in</h2>
<p>Access the hospital dashboard with a role-based session.</p>

<form class="auth-form" id="login-form" data-auth-form="login">
    <div class="form-grid">
        <div class="field full">
            <label for="login-email">Staff email</label>
            <input id="login-email" type="email" required placeholder="doctor@hospital.org">
        </div>
        <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" required minlength="6" placeholder="Enter password">
        </div>
        <div class="field">
            <label for="login-role">Role</label>
            <select id="login-role" required>
                <option>Administrator</option>
                <option>Doctor</option>
                <option>Nurse</option>
                <option>Receptionist</option>
            </select>
        </div>
        <div class="field full">
            <label for="login-department">Department</label>
            <select id="login-department" required>
                <option>General Medicine</option>
                <option>Cardiology</option>
                <option>Endocrinology</option>
                <option>Outpatient Clinic</option>
                <option>Administration</option>
            </select>
        </div>
    </div>

    <div class="auth-actions">
        <label class="auth-toggle">
            <input type="checkbox" id="login-remember" checked>
            Remember this device
        </label>
        <button class="btn primary" type="submit">Sign in</button>
    </div>

    <div class="auth-link-row">
        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
        <span>Need an account? <a href="{{ url_for('register') }}">Create one</a></span>
    </div>

    <div class="auth-footer">
        <span>Demo login stores a mock session locally.</span>
        <a href="{{ url_for('index') }}">Return to dashboard</a>
    </div>
</form>
{% endblock %}
